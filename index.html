/* ============================================================
   Seeded RNG — seed is the current timestamp (spec requirement).
   All gameplay randomness (word picks, spawn timing, armor mix)
   flows through this generator. Cosmetic effects use Math.random.
   ============================================================ */
function mulberry32(s) {
  return function () {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function newSeed() {
  const p = new URLSearchParams(location.search).get('seed');
  return p ? Number(p) : Date.now();
}

/* ============================================================
   Sound — tiny WebAudio synth, safe to fail silently
   ============================================================ */
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  return AC;
}
function tone(freq, dur, type, vol, slideTo) {
  const c = audio(); if (!c) return;
  try {
    if (c.state === 'suspended') c.resume();
    const t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  } catch (e) {}
}

function wordBand(lv) {
  const min = Math.min(3 + Math.floor((lv - 1) / 2), 6);
  const max = Math.min(4 + lv, 12);
  return [min, max];
}
function nextWord() {
  const [mn, mx] = wordBand(level);
  let pool = WORDS.filter(w => w.length >= mn && w.length <= mx);
  if (!pool.length) pool = WORDS;
  let w;
  do { w = pool[(rng() * pool.length) | 0]; } while (w === lastWord && pool.length > 1);
  lastWord = w; word = w; input = '';
}

/* ============================================================
   Enemies
   ============================================================ */
function tierWeights(lv) {
  if (lv <= 1) return [1, 0, 0, 0];
  if (lv === 2) return [0.55, 0.45, 0, 0];
  if (lv === 3) return [0.35, 0.35, 0.30, 0];
  if (lv === 4) return [0.25, 0.30, 0.30, 0.15];
  if (lv === 5) return [0.15, 0.28, 0.32, 0.25];
  return [0.10, 0.22, 0.33, 0.35];
}
function pickTier() {
  const w = tierWeights(level), r = rng();
  let acc = 0;
  for (let i = 0; i < 4; i++) { acc += w[i]; if (r < acc) return i; }
  return 3;
}
function spawnEnemy() {
  const t = pickTier();
  enemies.push({
    tier: t, hp: TIERS[t].hits,
    x: W + 18, speed: TIERS[t].speed,
    knocking: false, knockT: 0, phase: rng() * 6.28,
    dying: 0,
  });
}
function spawnInterval() {
  const base = Math.max(1.1, 3.4 - 0.28 * (level - 1));
  return base * (0.75 + 0.5 * rng());
}
function closestEnemy() {
  let best = null;
  for (const e of enemies) if (!e.dying && (!best || e.x < best.x)) best = e;
  return best;
}

/* ============================================================
   Ballistics — solve launch angle so the arrow lands on the
   target; leads moving targets by iterating on time of flight.
   ============================================================ */
function solveAngle(sx, sy, tx, ty) {
  const d = tx - sx;              // horizontal distance (+right)
  const h = ty - sy;              // vertical offset (+down)
  if (d <= 4) return null;
  const a = GRAV * d * d / (2 * ARROW_SPEED * ARROW_SPEED);
  const disc = d * d - 4 * a * (a - h);
  if (disc < 0) return null;      // out of range
  return Math.atan((d - Math.sqrt(disc)) / (2 * a)); // flat trajectory
}
function aimAt(e) {
  let tx = e.x, ang = null;
  const ty = GROUND - 26;         // chest height
  for (let i = 0; i < 3; i++) {
    ang = solveAngle(BOW.x, BOW.y, tx, ty);
    if (ang === null) return { ang: Math.PI / 4, t: 0 };
    const t = (tx - BOW.x) / (ARROW_SPEED * Math.cos(ang));
    const vx = e.knocking ? 0 : e.speed;
    tx = Math.max(STOP_X, e.x - vx * t);
  }
  return { ang, t: (tx - BOW.x) / (ARROW_SPEED * Math.cos(ang)) };
}
function currentAim() {
  const e = closestEnemy();
  return e ? aimAt(e).ang : Math.PI / 4;
}

/* ============================================================
   Firing & combat
   ============================================================ */
function fire() {
  const ang = currentAim();
  arrows.push({
    x: BOW.x + Math.cos(ang) * 18,
    y: BOW.y - Math.sin(ang) * 18,
    vx: ARROW_SPEED * Math.cos(ang),
    vy: -ARROW_SPEED * Math.sin(ang),
    state: 'fly', t: 0,
  });
  wordsFired++;
  sfx.shoot();
}
function hitEnemy(e, ax, ay) {
  e.hp--;
  if (e.hp <= 0) {
    e.dying = 0.7;
    kills++;
    score += TIERS[e.tier].score;
    sfx.kill();
    burst(ax, ay, '#b03a2e', 10);
    const newLevel = 1 + Math.floor(kills / KILLS_PER_LEVEL);
    if (newLevel > level) {
      level = newLevel;
      const heaviest = TIERS[Math.min(level - 1, 3)].name.toLowerCase();
      bannerText = 'Level ' + level + ' — French ' + heaviest + ' men-at-arms approach';
      bannerT = 2.4;
      sfx.levelUp();
    }
  } else {
    sfx.hitArmor();
    burst(ax, ay, '#cfd6df', 7);
  }
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 190,
      vy: -Math.random() * 150 - 20,
      life: 0.45 + Math.random() * 0.3,
      color,
    });
  }
}

/* ============================================================
   Update
   ============================================================ */
function update(dt) {
  elapsed += dt;

  // spawning — interval shrinks as level (difficulty) rises
  spawnT -= dt;
  if (spawnT <= 0) { spawnEnemy(); spawnT = spawnInterval(); }

  // enemies
  for (const e of enemies) {
    if (e.dying) { e.dying -= dt; continue; }
    if (e.x > STOP_X) {
      e.x -= e.speed * dt;
      e.phase += dt * e.speed * 0.14;
      if (e.x <= STOP_X) { e.x = STOP_X; e.knocking = true; e.knockT = 0; }
    } else {
      e.knocking = true;
      e.knockT += dt;
      if (e.knockT >= KNOCK_EVERY) {
        e.knockT -= KNOCK_EVERY;
        towerHP -= TIERS[e.tier].dmg;
        shake = 5;
        sfx.knock();
        burst(TOWER.x + TOWER.w - 4, GROUND - 24, '#8d8677', 5);
        if (towerHP <= 0) {
          towerHP = 0;
          state = 'gameover';
        }
      }
    }
  }
  enemies = enemies.filter(e => !(e.dying && e.dying <= 0));

  // arrows
  for (const a of arrows) {
    if (a.state === 'stuck') { a.t -= dt; if (a.t <= 0) a.dead = true; continue; }
    a.x += a.vx * dt;
    a.vy += GRAV * dt;
    a.y += a.vy * dt;
    for (const e of enemies) {
      if (e.dying) continue;
      if (Math.abs(a.x - e.x) < 13 && a.y > GROUND - 50 && a.y <= GROUND) {
        hitEnemy(e, a.x, a.y);
        a.dead = true;
        break;
      }
    }
    if (!a.dead && a.y >= GROUND - 2) { a.y = GROUND - 2; a.state = 'stuck'; a.t = 1.1; }
    if (a.x > W + 80) a.dead = true;
  }
  arrows = arrows.filter(a => !a.dead);

  // particles
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 500 * dt; p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  if (wordShake > 0) wordShake -= dt;
  if (shake > 0) shake = Math.max(0, shake - dt * 18);
  if (bannerT > 0) bannerT -= dt;
}

/* ============================================================
   Drawing
   ============================================================ */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#9fcdec');
  sky.addColorStop(1, '#e9f4fb');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND);

  // sun
  ctx.fillStyle = 'rgba(255,241,181,0.9)';
  ctx.beginPath(); ctx.arc(830, 74, 34, 0, 7); ctx.fill();

  // drifting clouds
  const t = performance.now() / 1000;
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  for (let i = 0; i < 3; i++) {
    const cx = ((t * (8 + i * 4) + i * 340) % (W + 220)) - 110;
    const cy = 60 + i * 42;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 46, 14, 0, 0, 7);
    ctx.ellipse(cx + 30, cy - 8, 30, 12, 0, 0, 7);
    ctx.ellipse(cx - 28, cy - 5, 26, 10, 0, 0, 7);
    ctx.fill();
  }

  // far hills
  ctx.fillStyle = '#b9d3a0';
  ctx.beginPath(); ctx.ellipse(240, GROUND + 30, 380, 90, 0, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#a5c78c';
  ctx.beginPath(); ctx.ellipse(760, GROUND + 40, 420, 110, 0, Math.PI, 0); ctx.fill();

  // ground
  ctx.fillStyle = '#7fb069';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = '#6d9c59';
  ctx.fillRect(0, GROUND, W, 5);
  ctx.strokeStyle = '#6d9c59';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 30; i++) {
    const gx = (i * 137 + 40) % W, gy = GROUND + 14 + (i * 53) % 40;
    ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx - 3, gy - 7); ctx.moveTo(gx, gy); ctx.lineTo(gx + 3, gy - 6); ctx.stroke();
  }
}

function fleurDeLis(x, y, s, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.quadraticCurveTo(x + s * 0.4, y - s * 0.15, x, y + s * 0.5);
  ctx.quadraticCurveTo(x - s * 0.4, y - s * 0.15, x, y - s);
  ctx.fill();
  ctx.beginPath(); ctx.arc(x - s * 0.55, y - s * 0.1, s * 0.3, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(x + s * 0.55, y - s * 0.1, s * 0.3, 0, 7); ctx.fill();
  ctx.fillRect(x - s * 0.6, y + s * 0.18, s * 1.2, s * 0.26);
  ctx.fillRect(x - s * 0.14, y + s * 0.5, s * 0.28, s * 0.42);
}

// French rallying banner planted where the men-at-arms muster
function drawFrenchBanner() {
  const px = 918, top = GROUND - 78;
  ctx.strokeStyle = '#5a5245';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(px, GROUND); ctx.lineTo(px, top); ctx.stroke();
  const wob = Math.sin(performance.now() / 320 + 2) * 2.5;
  ctx.beginPath();
  ctx.moveTo(px, top);
  ctx.lineTo(px - 36, top + wob);
  ctx.lineTo(px - 27, top + 11 + wob);
  ctx.lineTo(px - 36, top + 22 + wob);
  ctx.lineTo(px, top + 22);
  ctx.closePath();
  ctx.fillStyle = '#2b4a9b';
  ctx.fill();
  ctx.strokeStyle = '#1d3468';
  ctx.lineWidth = 1;
  ctx.stroke();
  fleurDeLis(px - 13, top + 11 + wob / 2, 6, '#e8c33a');
}

function drawTower() {
  const { x, w, top } = TOWER;
  // body
  ctx.fillStyle = '#aca795';
  ctx.fillRect(x, top, w, GROUND - top);
  ctx.strokeStyle = '#7c7867';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, top, w, GROUND - top);
  // mortar lines
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(110,105,90,0.55)';
  for (let yy = top + 22; yy < GROUND; yy += 22) {
    ctx.beginPath(); ctx.moveTo(x, yy); ctx.lineTo(x + w, yy); ctx.stroke();
    const off = ((yy - top) / 22) % 2 ? 14 : 0;
    for (let xx = x + off + 14; xx < x + w; xx += 28) {
      ctx.beginPath(); ctx.moveTo(xx, yy); ctx.lineTo(xx, yy - 22); ctx.stroke();
    }
  }
  // crenellations
  ctx.fillStyle = '#aca795';
  ctx.strokeStyle = '#7c7867';
  for (let i = 0; i < 4; i++) {
    const mx = x - 2 + i * (w + 4 - 18) / 3;
    ctx.fillRect(mx, top - 16, 18, 16);
    ctx.strokeRect(mx, top - 16, 18, 16);
  }

  // St George's cross — the English standard, flying toward the foe
  const fpx = x + w - 12, fpTop = top - 66;
  ctx.strokeStyle = '#5a5245';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(fpx, top - 14); ctx.lineTo(fpx, fpTop); ctx.stroke();
  const wob = Math.sin(performance.now() / 350) * 2.5;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(fpx, fpTop);
  ctx.lineTo(fpx + 34, fpTop + wob);
  ctx.lineTo(fpx + 34, fpTop + 20 + wob);
  ctx.lineTo(fpx, fpTop + 20);
  ctx.closePath();
  ctx.fillStyle = '#f4f1e8';
  ctx.fill();
  ctx.clip();
  ctx.fillStyle = '#c8102e';
  ctx.fillRect(fpx, fpTop + 7 + wob / 2, 34, 6);
  ctx.fillRect(fpx + 13, fpTop - 3, 7, 28);
  ctx.restore();
  ctx.strokeStyle = 'rgba(90,82,69,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(fpx, fpTop); ctx.lineTo(fpx + 34, fpTop + wob);
  ctx.lineTo(fpx + 34, fpTop + 20 + wob); ctx.lineTo(fpx, fpTop + 20);
  ctx.closePath(); ctx.stroke();
  // arrow slit + door
  ctx.fillStyle = '#4b4437';
  ctx.fillRect(x + w / 2 - 3, top + 60, 6, 26);
  ctx.fillStyle = '#6b4a2a';
  rr(x + w / 2 - 15, GROUND - 40, 30, 40, 10); ctx.fill();
  ctx.strokeStyle = '#4a3018'; ctx.stroke();

  // cracks as HP drops
  ctx.strokeStyle = 'rgba(60,55,45,0.8)';
  ctx.lineWidth = 1.6;
  if (towerHP < TOWER_MAX_HP * 0.66) {
    ctx.beginPath();
    ctx.moveTo(x + w - 8, GROUND - 8); ctx.lineTo(x + w - 26, GROUND - 42);
    ctx.lineTo(x + w - 14, GROUND - 66); ctx.lineTo(x + w - 30, GROUND - 92);
    ctx.stroke();
  }
  if (towerHP < TOWER_MAX_HP * 0.33) {
    ctx.beginPath();
    ctx.moveTo(x + 10, GROUND - 4); ctx.lineTo(x + 30, GROUND - 50);
    ctx.lineTo(x + 18, GROUND - 80); ctx.lineTo(x + 40, GROUND - 120);
    ctx.stroke();
  }

  // tower HP bar — kept above the archer's head, clear of the flag
  const bw = w - 16, bx = x - 4, by = top - 58;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  rr(bx, by, bw, 12, 6); ctx.fill();
  const frac = towerHP / TOWER_MAX_HP;
  ctx.fillStyle = frac > 0.5 ? '#5cab5c' : frac > 0.25 ? '#d9a441' : '#c0503f';
  if (frac > 0) { rr(bx + 1.5, by + 1.5, Math.max(4, (bw - 3) * frac), 9, 4.5); ctx.fill(); }
  ctx.fillStyle = '#2e2a22';
  ctx.font = 'bold 11px Georgia';
  ctx.textAlign = 'left';
  ctx.fillText('TOWER  ' + towerHP + ' / ' + TOWER_MAX_HP, bx + 2, by - 4);
  ctx.textAlign = 'center';
}

function drawArcher() {
  const ang = state === 'playing' ? currentAim() : Math.PI / 4;
  const ready = state === 'playing' && input === word && word.length > 0;
  const fy = TOWER.top + 1;                  // platform underfoot
  const sx = BOW.x - 4, sy = BOW.y + 2;      // shoulders
  const hy = fy - 11;                        // hips

  ctx.strokeStyle = '#3a3128';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // upright archer's stance — feet planted shoulder-width, side-on
  ctx.beginPath();
  ctx.moveTo(sx, hy); ctx.lineTo(sx - 6, fy);
  ctx.moveTo(sx, hy); ctx.lineTo(sx + 5, fy);
  ctx.stroke();
  // straight back, hips to shoulders
  ctx.beginPath(); ctx.moveTo(sx, hy); ctx.lineTo(sx, sy); ctx.stroke();

  // quiver at the hip
  ctx.save();
  ctx.translate(sx - 7, hy - 2);
  ctx.rotate(0.5);
  ctx.fillStyle = '#6b4a2a';
  ctx.fillRect(-2.5, -7, 5, 12);
  ctx.strokeStyle = '#5b4325';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(-1, -7); ctx.lineTo(-2, -12);
  ctx.moveTo(1.5, -7); ctx.lineTo(1, -12);
  ctx.stroke();
  ctx.restore();

  // English longbowman's surcoat — white with St George's cross
  ctx.fillStyle = '#f4f1e8';
  ctx.fillRect(sx - 5.5, sy - 2, 11, 15);
  ctx.fillStyle = '#c8102e';
  ctx.fillRect(sx - 1.2, sy - 2, 2.4, 15);
  ctx.fillRect(sx - 5.5, sy + 4, 11, 2.4);
  ctx.strokeStyle = 'rgba(60,50,40,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx - 5.5, sy - 2, 11, 15);

  // head held high, hooded, eyes on the target
  ctx.fillStyle = '#e0b48e';
  ctx.beginPath(); ctx.arc(sx + 1, sy - 9, 5.5, 0, 7); ctx.fill();
  ctx.fillStyle = '#4e6b3a';
  ctx.beginPath(); ctx.arc(sx + 1, sy - 10, 5.8, Math.PI * 0.95, Math.PI * 1.95); ctx.fill();

  // front arm extended straight to the bow grip, tracking the aim
  const bx = BOW.x + Math.cos(ang) * 14;
  const by = BOW.y - Math.sin(ang) * 14;
  const pull = ready ? -9 : 0;
  ctx.strokeStyle = '#3a3128';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(sx, sy + 2); ctx.lineTo(bx, by); ctx.stroke();
  // rear arm — drawn to the cheek when ready, at his side otherwise
  ctx.beginPath();
  ctx.moveTo(sx, sy + 2);
  if (ready) ctx.lineTo(bx + pull * Math.cos(ang), by - pull * Math.sin(ang));
  else ctx.lineTo(sx - 4, sy + 13);
  ctx.stroke();

  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(-ang);
  // the great warbow — near man-height
  ctx.strokeStyle = '#7a4a22';
  ctx.lineWidth = 2.6;
  ctx.beginPath(); ctx.arc(0, 0, 15, -Math.PI / 2.15, Math.PI / 2.15); ctx.stroke();
  // string (pulled when word is matched)
  const tipX = 15 * Math.cos(Math.PI / 2.15), tipY = 15 * Math.sin(Math.PI / 2.15);
  ctx.strokeStyle = '#e8e4d8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tipX, -tipY);
  ctx.lineTo(pull, 0);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  // nocked arrow, visible when drawn
  if (ready) {
    ctx.strokeStyle = '#5b4325';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(pull, 0); ctx.lineTo(19, 0); ctx.stroke();
    ctx.fillStyle = '#c9cdd4';
    ctx.beginPath(); ctx.moveTo(19, 0); ctx.lineTo(14.5, -2.6); ctx.lineTo(14.5, 2.6); ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // faint trajectory preview when the shot is ready
  if (ready) {
    const e = closestEnemy();
    if (e) {
      ctx.fillStyle = 'rgba(60,50,35,0.30)';
      let px = BOW.x + Math.cos(ang) * 18, py = BOW.y - Math.sin(ang) * 18;
      let vx = ARROW_SPEED * Math.cos(ang), vy = -ARROW_SPEED * Math.sin(ang);
      const st = 0.05;
      for (let i = 0; i < 40; i++) {
        px += vx * st; vy += GRAV * st; py += vy * st;
        if (py > GROUND - 2 || px > W) break;
        if (i % 2 === 0) { ctx.beginPath(); ctx.arc(px, py, 1.6, 0, 7); ctx.fill(); }
      }
    }
  }
}

function drawEnemy(e) {
  const T = TIERS[e.tier];
  ctx.save();
  const lunge = e.knocking ? -Math.abs(Math.sin(e.knockT / KNOCK_EVERY * Math.PI)) * 7 : 0;
  ctx.translate(e.x + lunge, GROUND);

  if (e.dying > 0) {
    const k = 1 - e.dying / 0.7;
    ctx.globalAlpha = Math.max(0, 1 - k * 1.15);
    ctx.rotate(k * 1.5);       // topple backward
  }

  const swing = e.knocking ? 0 : Math.sin(e.phase) * 0.55;
  ctx.strokeStyle = '#2f2a24';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // legs
  ctx.beginPath();
  ctx.moveTo(0, -16); ctx.lineTo(Math.sin(swing) * 7, 0);
  ctx.moveTo(0, -16); ctx.lineTo(-Math.sin(swing) * 7, 0);
  ctx.stroke();
  // body
  ctx.fillStyle = T.body;
  ctx.strokeStyle = T.trim;
  ctx.lineWidth = 1.6;
  rr(-8, -38, 16, 23, 4); ctx.fill(); ctx.stroke();
  // chain mail texture
  if (e.tier === 2) {
    ctx.fillStyle = 'rgba(70,78,88,0.5)';
    for (let yy = -35; yy < -18; yy += 4)
      for (let xx = -6; xx < 8; xx += 4) { ctx.beginPath(); ctx.arc(xx, yy, 1, 0, 7); ctx.fill(); }
  }
  // plate shine
  if (e.tier === 3) {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(-4, -36); ctx.lineTo(-4, -20); ctx.stroke();
  }
  // head + helmet
  ctx.fillStyle = '#e0b48e';
  ctx.beginPath(); ctx.arc(0, -44, 5.5, 0, 7); ctx.fill();
  ctx.fillStyle = T.helm;
  ctx.strokeStyle = T.trim;
  ctx.beginPath(); ctx.arc(0, -45, 6, Math.PI, 0); ctx.fill();
  if (e.tier >= 2) { ctx.fillRect(-6, -45, 12, 3); }  // face guard
  // sword arm (raised while knocking)
  ctx.strokeStyle = '#2f2a24';
  ctx.lineWidth = 2.6;
  const armAng = e.knocking ? -1.9 + Math.sin(e.knockT / KNOCK_EVERY * Math.PI) * 0.9 : -0.5 + Math.sin(e.phase) * 0.2;
  const ax = -8 + Math.cos(Math.PI + armAng) * -10, ay = -33 + Math.sin(Math.PI + armAng) * -10;
  ctx.beginPath(); ctx.moveTo(-6, -33); ctx.lineTo(ax, ay); ctx.stroke();
  ctx.strokeStyle = '#aeb4bd';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax - 9, ay - 7); ctx.stroke();
  // French heater shield — azure, charged with a gold fleur-de-lis
  ctx.fillStyle = '#2b4a9b';
  ctx.strokeStyle = '#1d3468';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(1, -35); ctx.lineTo(11, -35); ctx.lineTo(11, -27);
  ctx.quadraticCurveTo(11, -21.5, 6, -19.5);
  ctx.quadraticCurveTo(1, -21.5, 1, -27);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  fleurDeLis(6, -28, 4.6, '#e8c33a');

  // HP pips
  if (!e.dying) {
    for (let i = 0; i < TIERS[e.tier].hits; i++) {
      ctx.fillStyle = i < e.hp ? '#c0392b' : 'rgba(0,0,0,0.25)';
      ctx.fillRect(-TIERS[e.tier].hits * 3.5 + i * 7, -58, 5, 5);
    }
  }
  ctx.restore();
}

function drawArrow(a) {
  const ang = a.state === 'stuck' ? Math.atan2(a.vy, a.vx) : Math.atan2(a.vy, a.vx);
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(ang);
  if (a.state === 'stuck') ctx.globalAlpha = Math.max(0, a.t / 1.1);
  ctx.strokeStyle = '#5b4325';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(2, 0); ctx.stroke();
  ctx.fillStyle = '#c9cdd4';
  ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(-1, -2.8); ctx.lineTo(-1, 2.8); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-11, -3); ctx.lineTo(-8, 0); ctx.lineTo(-11, 3); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawWordPanel() {
  const ready = input === word && word.length > 0;
  const jitter = wordShake > 0 ? Math.sin(wordShake * 60) * 5 : 0;
  const cx = W / 2 + jitter;

  ctx.font = 'bold 38px Georgia';
  const widths = [];
  let total = 0;
  for (const ch of word) { const w = ctx.measureText(ch).width + 4; widths.push(w); total += w; }
  const extra = input.slice(word.length);
  const panelW = Math.max(total + 70, 260);

  // panel
  ctx.save();
  ctx.fillStyle = 'rgba(246,238,219,0.94)';
  ctx.strokeStyle = ready ? '#c9a227' : '#8a7a55';
  ctx.lineWidth = ready ? 3.5 : 2;
  if (ready) { ctx.shadowColor = 'rgba(201,162,39,0.8)'; ctx.shadowBlur = 14; }
  rr(cx - panelW / 2, 26, panelW, 62, 10);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // letters, colored by typing state
  let x = cx - total / 2;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 38px Georgia';
  for (let i = 0; i < word.length; i++) {
    if (i < input.length) ctx.fillStyle = input[i] === word[i] ? '#2e7d32' : '#c0392b';
    else ctx.fillStyle = '#3d3629';
    ctx.fillText(word[i], x, 58);
    if (i === input.length && !ready) {  // caret
      ctx.fillStyle = 'rgba(61,54,41,0.75)';
      ctx.fillRect(x - 2, 74, widths[i] - 2, 3);
    }
    x += widths[i];
  }
  if (extra) {
    ctx.fillStyle = '#c0392b';
    ctx.font = 'bold 24px Georgia';
    ctx.fillText(extra, x + 4, 60);
  }

  ctx.textAlign = 'center';
  ctx.font = 'italic 15px Georgia';
  if (ready) {
    const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 160);
    ctx.fillStyle = 'rgba(140,100,20,' + pulse.toFixed(2) + ')';
    ctx.fillText('press SPACE to loose the arrow', cx, 104);
  } else if (elapsed < 9) {
    ctx.fillStyle = 'rgba(70,60,45,0.75)';
    ctx.fillText('type the word — SPACE fires only on a perfect match', cx, 104);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawHUD() {
  ctx.textAlign = 'right';
  ctx.fillStyle = '#2e2a22';
  ctx.font = 'bold 18px Georgia';
  ctx.fillText('Score ' + score, W - 20, 34);
  ctx.font = '15px Georgia';
  ctx.fillText('Level ' + level + '   ·   Kills ' + kills, W - 20, 56);

  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(46,42,34,0.55)';
  ctx.font = '11px Georgia';
  ctx.fillText('seed ' + seed, 12, H - 10);
  ctx.textAlign = 'center';
}

function drawBanner() {
  if (bannerT <= 0) return;
  const alpha = Math.min(1, bannerT / 0.5);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(40,34,24,0.82)';
  ctx.font = 'bold 26px Georgia';
  const tw = ctx.measureText(bannerText).width;
  rr(W / 2 - tw / 2 - 24, 160, tw + 48, 46, 10);
  ctx.fill();
  ctx.fillStyle = '#f3e9c9';
  ctx.textAlign = 'center';
  ctx.fillText(bannerText, W / 2, 191);
  ctx.restore();
}

function drawLegend(y) {
  ctx.font = '14px Georgia';
  ctx.textAlign = 'center';
  const spacing = 158;
  let x = W / 2 - spacing * 1.5;
  for (let i = 0; i < 4; i++) {
    const T = TIERS[i];
    ctx.fillStyle = T.body;
    ctx.strokeStyle = T.trim;
    ctx.lineWidth = 1.6;
    rr(x - 8, y - 20, 16, 22, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#f3e9c9';
    ctx.fillText(T.name, x, y + 22);
    ctx.fillStyle = 'rgba(243,233,201,0.7)';
    ctx.fillText(T.hits + (T.hits === 1 ? ' hit' : ' hits'), x, y + 40);
    x += spacing;
  }
}

function drawOverlay(title, lines, footer) {
  ctx.fillStyle = 'rgba(20,24,32,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f3e9c9';
  ctx.font = 'bold 54px Georgia';
  ctx.fillText(title, W / 2, 130);
  ctx.font = '18px Georgia';
  let y = 175;
  for (const ln of lines) { ctx.fillText(ln, W / 2, y); y += 28; }
  const pulse = 0.55 + 0.45 * Math.sin(performance.now() / 300);
  ctx.fillStyle = 'rgba(243,233,201,' + pulse.toFixed(2) + ')';
  ctx.font = 'bold 22px Georgia';
  ctx.fillText(footer, W / 2, H - 60);
}

function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  drawBackground();
  drawFrenchBanner();
  drawTower();
  drawArcher();
  for (const e of enemies) drawEnemy(e);
  for (const a of arrows) drawArrow(a);
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life * 2.5);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    ctx.globalAlpha = 1;
  }

  if (state === 'playing') {
    drawWordPanel();
    drawHUD();
    drawBanner();
  }
  ctx.restore();

  if (state === 'start') {
    drawOverlay('LONGBOW', [
      "England's last longbowman holds the tower against the French host.",
      '',
      'French men-at-arms march on your tower. Type the word shown,',
      'then press SPACE — the longbowman looses an arrow at the closest foe.',
      'Space only fires on a perfect match. Backspace fixes mistakes.',
      '',
      'The French wear ever-heavier armor — more arrows to bring them down:',
    ], 'press ENTER to begin');
    drawLegend(392);
  } else if (state === 'gameover') {
    const acc = keystrokes > 0 ? Math.round(100 * (keystrokes - typos) / keystrokes) : 100;
    drawOverlay('THE TOWER HAS FALLEN', [
      'The French broke through, and the English longbowman fell with his keep.',
      '',
      'Score ' + score + '   ·   Level ' + level + '   ·   Kills ' + kills,
      'Arrows loosed ' + wordsFired + '   ·   Typing accuracy ' + acc + '%',
      '',
      'seed ' + seed,
    ], 'press ENTER to fight again');
  }
}

/* ============================================================
   Input
   ============================================================ */
window.addEventListener('keydown', (e) => {
  if (AC && AC.state === 'suspended') AC.resume();

  if (state !== 'playing') {
    if (e.key === 'Enter') startGame();
    return;
  }
  if (e.key === ' ') {
    e.preventDefault();
    if (input === word) {          // space only works on a full match
      fire();
      nextWord();
    } else {
      wordShake = 0.4;
      sfx.error();
    }
    return;
  }
  if (e.key === 'Backspace') {
    e.preventDefault();
    input = input.slice(0, -1);
    return;
  }
  if (e.key.length === 1 && /^[a-z]$/i.test(e.key)) {
    if (input.length < word.length + 3) {
      input += e.key.toLowerCase();
      keystrokes++;
      if (word.startsWith(input)) sfx.type();
      else { typos++; sfx.badType(); }
    }
  }
});

/* ============================================================
   Main loop
   ============================================================ */
let last = 0;
function frame(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if (state === 'playing') update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// small debug/testing handle
window.__game = {
  get state() { return state; },
  get word() { return word; },
  get input() { return input; },
  get enemies() { return enemies; },
  get arrows() { return arrows; },
  get towerHP() { return towerHP; },
  get score() { return score; },
  get kills() { return kills; },
  get level() { return level; },
  get seed() { return seed; },
  step(dt) { if (state === 'playing') update(dt); },
};
</script>
</body>
